# Render configuration for GradeScanner application
services:
  - type: web
    name: gradescanner
    runtime: python
    plan: free
    buildCommand: pip install --only-binary :all: -r requirements.txt
    startCommand: gunicorn --workers 2 --bind 0.0.0.0:$PORT server:app --log-file -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.10
    region: ohio
