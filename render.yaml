# Render configuration for GradeScanner application
services:
  - type: web
    name: gradescanner
    runtime: docker
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: ""  # Asegúrate de poner aquí tu credencial de Supabase en el panel de Render
    region: ohio
